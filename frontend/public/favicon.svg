<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- e ring: outer r=37, inner r=23, center (50,50), gap on right ±30deg -->
  <!-- outer gap points: (82,68.5) and (82,31.5) | inner: (69.9,61.5) and (69.9,38.5) -->
  <path d="M82 68.5 A37 37 0 1 0 82 31.5 L69.9 38.5 A23 23 0 1 1 69.9 61.5 Z" fill="#3B28CC"/>
  <!-- diagonal bar through center — line from (78,18) to (22,82), midpoint exactly (50,50) -->
  <line x1="78" y1="18" x2="22" y2="82" stroke="#3B28CC" stroke-width="13" stroke-linecap="round"/>
  <!-- tail extending bottom-left -->
  <line x1="30" y1="78" x2="10" y2="97" stroke="#4A38D4" stroke-width="7" stroke-linecap="round" opacity="0.65"/>
</svg>
