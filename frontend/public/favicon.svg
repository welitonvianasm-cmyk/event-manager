<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <mask id="em">
      <rect width="100" height="100" fill="black"/>
      <!-- outer ring -->
      <circle cx="51" cy="46" r="37" fill="white"/>
      <!-- inner hole -->
      <circle cx="51" cy="46" r="21" fill="black"/>
      <!-- right gap (opens e on right side ~2 o'clock to 5 o'clock) -->
      <polygon points="51,46 98,18 98,74" fill="black"/>
      <!-- crossbar restoring the horizontal band -->
      <rect x="14" y="42" width="60" height="8" fill="white"/>
    </mask>
    <linearGradient id="dg" x1="0.82" y1="0.05" x2="0.22" y2="0.95">
      <stop offset="0%" stopColor="white" stopOpacity="0.55"/>
      <stop offset="40%" stopColor="white" stopOpacity="0.2"/>
      <stop offset="100%" stopColor="white" stopOpacity="0"/>
    </linearGradient>
  </defs>
  <!-- e body -->
  <rect width="100" height="100" fill="#3B28CC" mask="url(#em)"/>
  <!-- diagonal highlight -->
  <polygon points="86,6 96,16 28,92 18,82" fill="url(#dg)" mask="url(#em)"/>
  <!-- tail extending bottom-left -->
  <polygon points="19,80 2,100 16,100 33,80" fill="#3B28CC" opacity="0.55"/>
</svg>
